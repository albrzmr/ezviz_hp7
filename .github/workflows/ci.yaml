name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # Runtime deps the integration imports during test collection.
          pip install pytest pytest-asyncio cryptography pycryptodome xmltodict requests paho-mqtt pandas
      - name: pytest
        run: pytest tests/ -v
